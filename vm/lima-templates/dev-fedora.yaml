minimumLimaVersion: 2.0.0

base:
- template:_images/fedora-44

# mounts:
# - location: "~/dev-vm-shared"
#   mountPoint: "{{.Home}}/shared"
#   writable: false
#
# portForwards:
# - guestPortRange: [8000, 9000]
#   hostPortRange: [18000, 19000]
#

provision:
- mode: system
  script: |
    #!/bin/sh

    set -eux

    dnf -y group install development-tools
    dnf -y install tmux
    dnf -y install fish
    dnf -y install neovim
    dnf -y install fzf
    dnf -y install bat
    dnf -y install fd-find
    dnf -y install hyperfine
    dnf -y install jq
    dnf -y install yq
    dnf -y install tokei
    dnf -y install ShellCheck
    dnf -y install opam

- mode: user
  script: |
    #!/bin/sh

    set -eux

    brew_prefix="/home/linuxbrew/.linuxbrew"

    if ! command -v "${brew_prefix}/bin/brew" >/dev/null 2>&1; then
      NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    else
      echo "Homebrew is already installed, skipping"
    fi

    "${brew_prefix}/bin/brew" bundle install --no-upgrade --file=- <<eof
    brew "mise"
    brew "ripgrep"
    brew "shfmt"
    brew "starship"
    eof

- mode: user
  script: |
    #!/bin/sh

    set -eux

    dotfiles_path="${HOME}/dotfiles"
    if [ -d "${dotfiles_path}" ]; then
      echo "Dotfile config already provisioned, skipping"
      exit 0
    fi

    git clone https://github.com/phossc/dotfiles.git "${dotfiles_path}"

    if ! [ -e "${HOME}/.config/fish/config.fish" ]; then
      ln -s "${dotfiles_path}/vm/config-deviations/fish/config.fish" "${HOME}/.config/fish/config.fish"
    fi

    if ! [ -e "${HOME}/.config/fish/conf.d/tokyonight-moon.fish" ]; then
      ln -s "${dotfiles_path}/vm/config-deviations/fish/conf.d/tokyonight-moon.fish" "${HOME}/.config/fish/conf.d/tokyonight-moon.fish"
    fi

    if ! [ -e "${HOME}/.config/tmux/tmux.conf" ]; then
      ln -s "${dotfiles_path}/vm/config-deviations/tmux/tmux.conf" "${HOME}/.config/tmux/tmux.conf"
    fi

    if ! [ -e "${HOME}/.config/starship.toml" ]; then
      ln -s "${dotfiles_path}/.config/starship.toml" "${HOME}/.config/starship.toml"
    fi

    if ! [ -d "${HOME}/.config/nvim" ]; then
      ln -s "${dotfiles_path}/.config/nvim" "${HOME}/.config/nvim"
    fi

- mode: user
  script: |
    #!/bin/sh

    echo "-------------------------------------------------------------------"
    echo "Run 'sudo dnf -y upgrade --refresh' to update your system."
    echo "Run 'dnf needs-restarting -r' to see if a reboot is required."
    echo "Run 'brew upgrade' to update homebrew packages."
    echo "-------------------------------------------------------------------"
    echo "Set up basic git configuration:"
    echo "Name:  'git config --global user.name \"your name\"'"
    echo "Email: 'git config --global user.email \"your email\"'"
    echo "-------------------------------------------------------------------"

cpus: 2
memory: 2GiB
disk: 20GiB
